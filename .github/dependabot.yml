version: 2
updates:
  # Frontend deps (Excalidraw, CodeMirror, React, …). Dependabot opens PRs when a
  # newer version is published; the release workflow validates the build on the PR.
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    # Only track the two core libraries — CodeMirror (editor) and Excalidraw
    # (drawing). Everything else stays pinned and is updated manually.
    allow:
      - dependency-name: "@excalidraw/*"
      - dependency-name: "@codemirror/*"
      - dependency-name: "codemirror"
      - dependency-name: "@lezer/*"
    groups:
      excalidraw:
        patterns:
          - "@excalidraw/*"
      codemirror:
        patterns:
          - "@codemirror/*"
          - "codemirror"
          - "@lezer/*"
    commit-message:
      prefix: "deps"

  # Go modules.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"

  # Keep the GitHub Actions themselves current (avoids future Node deprecations).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
