version: 2
updates:
  # Frontend deps (Excalidraw, CodeMirror, React, …). Dependabot opens PRs when a
  # newer version is published; the release workflow validates the build on the PR.
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    groups:
      excalidraw:
        patterns:
          - "@excalidraw/*"
      editor:
        patterns:
          - "@codemirror/*"
          - "codemirror"
          - "@lezer/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
      build-tooling:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "typescript"
          - "zustand"
    commit-message:
      prefix: "deps"

  # Go modules.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"

  # Keep the GitHub Actions themselves current (avoids future Node deprecations).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
