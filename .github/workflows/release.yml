name: release

# Build the SPA + cross-compile the linux/amd64 binary and attach it to a
# GitHub Release whenever a v* tag is pushed. The server downloads this asset
# with `gh release download` (see DEPLOYMENT.md).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build SPA
        run: |
          cd web
          npm ci
          npm run build

      - name: Cross-compile (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o scratchpad-linux-amd64 ./cmd/scratchpad

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: scratchpad-linux-amd64
          generate_release_notes: true
