name: build

# Validates that the SPA + Go binary compile — runs on every PR (including
# Dependabot's Excalidraw bumps) and on pushes to main. A failing build here is
# the signal that an upgrade broke something (e.g. an Excalidraw API change).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build SPA
        run: |
          cd web
          npm ci
          npm run build

      - name: Build binary (verifies the embed)
        run: go build ./...

      - name: Smoke test (boot binary, assert SPA + health serve)
        run: |
          go build -o scratchpad ./cmd/scratchpad
          SCRATCHPAD_ENV=/dev/null SCRATCHPAD_PASSWORD= PORT=8099 \
            DATA_DIR="$(mktemp -d)" DB_PATH="$(mktemp -u)" ./scratchpad &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          for i in $(seq 1 20); do curl -fsS -o /dev/null http://127.0.0.1:8099/healthz && break || sleep 0.5; done
          set -e
          echo "healthz:"; curl -fsS -o /dev/null -w '%{http_code}\n' http://127.0.0.1:8099/healthz
          JS=$(curl -fsS http://127.0.0.1:8099/ | grep -oE 'assets/index-[^"]+\.js' | head -1)
          echo "bundle: $JS"; test -n "$JS"
          code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:8099/$JS")
          echo "bundle status: $code"; test "$code" = "200"
