site_name: Scratchpad
site_description: A self-hosted workspace for code, drawings, mindmaps, docs and boards.
site_url: https://phoenix911.github.io/scratchpad/docs/
repo_url: https://github.com/phoenix911/scratchpad
repo_name: phoenix911/scratchpad
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - Deployment: deployment.md
  - Git sync: git-sync.md
  - Item types: item-types.md
  - Architecture: architecture.md
  - Data model: data-model.md
  - HTTP API: api.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/phoenix911/scratchpad
